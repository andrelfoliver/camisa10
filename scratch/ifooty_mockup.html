<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFooty Final Branding Concept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #CCFF00;
            --bg: #070709;
            --text: #FAFAFA;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .logo-container {
            text-align: center;
            padding: 4rem;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            background: linear-gradient(135deg, #101015, #050508);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
            max-width: 800px;
        }
        .logo {
            font-size: 8rem;
            font-style: italic;
            font-weight: 900;
            letter-spacing: -3px;
            display: flex;
            align-items: baseline;
            margin-bottom: 2rem;
        }
        .logo .i {
            color: var(--accent);
        }
        .logo .dot {
            color: var(--accent);
        }
        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0.4;
            margin-bottom: 4rem;
        }
        .favicon-preview {
            display: flex;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.02);
            padding: 2rem;
            border-radius: 20px;
        }
        .favicon-box {
            font-size: 3rem;
            font-style: italic;
            font-weight: 900;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }
        .favicon-box .i { color: var(--accent); }
        .favicon-box .F { color: var(--text); }
        .favicon-box .dot { color: var(--accent); }

        .favicon-label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: left;
        }
        .favicon-label strong {
            color: var(--accent);
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="label">Primary Logo Concept</div>
        <div class="logo">
            <span class="i">i</span>Footy<span class="dot">.</span>
        </div>
        
        <div class="favicon-preview">
            <div class="favicon-box">
                <span class="i">i</span><span class="F">F</span><span class="dot">.</span>
            </div>
            <div class="favicon-label">
                <strong>Final Favicon Concept</strong>
                Slanted "iF." monogram.<br>
                Green "i" and ".", White "F".<br>
                Communicates tech-driven soccer identity.
            </div>
        </div>
    </div>
</body>
</html>
